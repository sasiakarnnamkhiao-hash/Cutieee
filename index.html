<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Nonioaey Payment Gateway ✨</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            /* ปรับพื้นหลังเป็นสีชมพูอ่อนมาก พร้อมลายตาราง Grid เล็กๆ */
            background-color: #fff5f7;
            background-image: 
                linear-gradient(rgba(255, 192, 203, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 192, 203, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            background-attachment: fixed;
            overflow-x: hidden;
            color: #8c6b56;
        }

        /* --- เอฟเฟกต์กระจกฝ้า (Glassmorphism) สไตล์ iPhone --- */
        .glass-effect {
            background: rgba(255, 255, 255, 0.25) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 20px !important;
            box-shadow: 0 8px 32px rgba(244, 114, 182, 0.1) !important;
        }

        /* --- CSS Sprites: ดึงรูปจากไฟล์ภาพใหญ่ --- */
        .sprite-deco {
            background-repeat: no-repeat;
            position: absolute;
            pointer-events: none;
            z-index: 20;
        }

        /* หัวข้อ Nonioaey Payment จาก IMG_6982.png */
        .header-logo {
            width: 280px; height: 100px;
            background-image: url('IMG_6982.png');
            background-size: 600px auto; /* ปรับขนาดตามแผ่นงาน */
            background-position: -40px -730px; /* ตำแหน่งคำว่า Nonioaey Payment */
            display: block;
            margin: 0 auto;
        }

        /* ตกแต่งโบว์จาก IMG_6981.png หน้าปุ่ม */
        .bow-icon {
            display: inline-block;
            width: 30px; height: 30px;
            background-image: url('IMG_6981.png');
            background-size: 500px auto;
            background-position: -25px -455px;
            vertical-align: middle;
            margin-right: 5px;
        }

        /* ม้าบินจาก IMG_6982.png */
        .pegasus {
            width: 80px; height: 80px;
            background-image: url('IMG_6982.png');
            background-size: 500px auto;
            background-position: -390px -770px;
            top: -20px; right: -30px;
            transform: rotate(15deg);
        }

        /* เมฆนุ่มฟูจาก IMG_6982.png */
        .cloud-deco {
            width: 100px; height: 60px;
            background-image: url('IMG_6982.png');
            background-size: 500px auto;
            background-position: -20px -470px;
            bottom: -10px; left: -40px;
            opacity: 0.8;
        }

        /* ประกายวิ้งๆ กระจายตามมุม */
        .sparkle {
            width: 40px; height: 40px;
            background-image: url('IMG_6981.png');
            background-size: 500px auto;
            background-position: -265px -460px;
        }

        /* --- เอฟเฟกต์ฟองสบู่เดิม (เก็บไว้เพื่อความนุ่มฟู) --- */
        .soap-bubble {
            position: fixed;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatUpSoap linear infinite;
        }

        @keyframes floatUpSoap {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .particle {
            position: fixed;
            width: 8px; height: 8px;
            background-color: #ffb6c1;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: explode 0.6s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-5 relative">

    <script>
        window.addEventListener('load', () => {
            for (let i = 0; i < 20; i++) {

                bubble.style.width = size;
                bubble.style.height = size;
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.animationDuration = Math.random() * 10 + 5 + 's';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(bubble);
            }
        });
    </script>

    <div class="glass-effect w-full max-w-md relative z-10 p-6 space-y-6">
        
        <div class="bg-white/30 border border-white/40 rounded-[18px] p-5 text-center">

            <p class="text-[13px] text-pink-400 font-semibold mb-3">โอนแล้วแปะโน้ตสลิปให้ด้วยน้า</p>
            <div class="h-px w-1/2 bg-white/50 mx-auto mb-3"></div>

            <div class="flex items-center gap-4">
                <div class="w-12 h-12 glass-effect flex items-center justify-center font-bold text-pink-400 text-xl">K</div>
                <div class="flex flex-col">

                    <span class="text-gray-700 font-bold text-[17px]">131-1-45867-8</span>

            </div>
            <button onclick="copyAndExplode(event, '1311458678')" class="glass-effect w-full py-2.5 text-pink-400 text-[13px] font-bold active:scale-95 transition-transform">

        <div class="bg-white/40 border border-white/50 rounded-[20px] p-4 flex flex-col gap-4">
            <div class="flex items-center gap-4">

                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-400 font-bold uppercase">Wallet</span>
                    <span class="text-gray-700 font-bold text-[17px]">0826348896</span>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="copyAndExplode(event, '0826348896')" class="glass-effect flex-1 py-2.5 text-pink-400 text-[13px] font-bold">คัดลอก</button>
                <a href="https://tmn.app.link/nEoPnxQ9R1b" target="_blank" class="flex-1 py-2.5 bg-pink-300 text-white rounded-[20px] text-[13px] font-bold text-center shadow-md">ไปหน้าโอน</a>

        </div>

        <div class="bg-pink-100/30 border border-white/50 rounded-[20px] p-4 flex flex-col gap-4">

        <div class="pt-4 flex justify-center gap-6">
            <a href="https://www.facebook.com/share/18W6w2niHC/?mibextid=wwXIfr" target="_blank" class="w-10 h-10 glass-effect flex items-center justify-center text-blue-500">

            </a>
        </div>
    </div>

    <div class="sprite-deco sparkle" style="bottom: 50px; right: 20px;"></div>

    <script>
        function copyAndExplode(event, text) {
            // สร้างเอฟเฟกต์ระเบิดเบาๆ
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                document.body.appendChild(p);
                const angle = Math.random() * Math.PI * 2;
                const v = 20 + Math.random() * 30;
                p.style.left = event.clientX + 'px';
                p.style.top = event.clientY + 'px';
                p.style.setProperty('--tx', `${Math.cos(angle) * v}px`);
                p.style.setProperty('--ty', `${Math.sin(angle) * v}px`);
                setTimeout(() => p.remove(), 600);
            }

            // คัดลอกข้อความ
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            // แสดง Toast
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }
    </script>
</body>
</html>
